name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install "setuptools<82"
          pip install -r requirements.txt
          pip install scons pyinstaller patchelf==0.14.5.0
          pip install --no-build-isolation staticx

      - name: Strip RUNPATH from all shared libraries
        run: |
          # Python stdlib .so files (setup-python sets absolute RUNPATH)
          PYTHON_LIB=$(python -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")
          find "$PYTHON_LIB" -name "*.so*" -exec sh -c '
            rpath=$(patchelf --print-rpath "$1" 2>/dev/null)
            [ -n "$rpath" ] && patchelf --remove-rpath "$1"
          ' _ {} \; 2>/dev/null || true

          # ALL .so files in site-packages (vendored .libs/, native extensions, etc.)
          # Covers: Pillow.libs, cryptography.libs, uharfbuzz, cffi, and any future deps
          SITE_PKGS=$(python -c "import site; print(site.getsitepackages()[0])")
          find "$SITE_PKGS" -name "*.so*" -exec sh -c '
            rpath=$(patchelf --print-rpath "$1" 2>/dev/null)
            [ -n "$rpath" ] && patchelf --remove-rpath "$1"
          ' _ {} \; 2>/dev/null || true

      - name: Build with PyInstaller
        run: pyinstaller 3x-bot.spec --noconfirm

      - name: Patch RUNPATH in cached libraries
        run: |
          for lib in ~/.cache/pyinstaller/bincache*/**.so*; do
            rpath=$(patchelf --print-rpath "$lib" 2>/dev/null) || true
            if [[ -n "$rpath" ]]; then
              patchelf --remove-rpath "$lib"
            fi
          done 2>/dev/null || true

      - name: Rebuild with patched libraries
        run: |
          rm -rf build/3x-bot dist/3x-bot
          pyinstaller 3x-bot.spec --noconfirm

      - name: Create static binary
        run: staticx dist/3x-bot dist/3x-bot-static

      - name: Rename binary
        run: mv dist/3x-bot-static dist/3x-bot-linux-${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: 3x-bot-linux-${{ matrix.arch }}
          path: dist/3x-bot-linux-${{ matrix.arch }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mv artifacts/3x-bot-linux-amd64/3x-bot-linux-amd64 .
          mv artifacts/3x-bot-linux-arm64/3x-bot-linux-arm64 .
          chmod +x 3x-bot-linux-amd64 3x-bot-linux-arm64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: false
          files: |
            3x-bot-linux-amd64
            3x-bot-linux-arm64
